<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
</head>
  <body class="bg-blue-200 min-h-screen flex flex-col items-center justify-center"  >
    <h1 class="text-2xl text-[hsl(183_98%_16%)] mb-12 text-center font-mono">SPLI <br> TTER</h1>
    <section class="flex gap-8 w-[60%] rounded-2xl bg-white">
  <div class="flex flex-col gap-6 p-8 w-1/2">
     <div>
        <label class="font-semibold text-gray-600 font-mono">Bill</label>
        <input id="bill" type="number" placeholder="$" class="w-full mt-2 p-2 bg-gray-100 rounded text-right"/>
      </div>
      <div>
        <label class="font-semibold text-gray-600 font-mono">Select Tip %</label>
        <div class="grid grid-cols-3 gap-3 mt-2">
          <button class=" tip-btn bg-[hsl(183_98%_16%)] font-mono text-white py-2 rounded">5%</button>
          <button class="tip-btn bg-[hsl(183_98%_16%)] font-mono text-white py-2 rounded">10%</button>
          <button class="tip-btn bg-[hsl(183_98%_16%)] font-mono text-white py-2 rounded">15%</button>
          <button class="tip-btn bg-[hsl(183_98%_16%)] font-mono text-white py-2 rounded">25%</button>
          <button class="tip-btn bg-[hsl(183_98%_16%)]  font-mono text-white py-2 rounded">50%</button>
          <input id="custom-tip" type="number" placeholder="Custom" class="bg-gray-100 text-center  font-mono rounded"/>
        </div>
      </div>
      <div>
        <label class="font-semibold font-mono text-gray-600">Number of People</label>
        <input id="people" type="number" placeholder="0" class="w-full mt-2 p-2 bg-gray-100 rounded text-right"/>
      </div>
    </div>   
    <div class="flex flex-col m-8 p-12 rounded-2xl bg-[hsl(183_98%_16%)] gap-8 w-1/2">
        <div class="flex justify-between items-center">
          <div>
            <h2 class="text-white font-mono"> <strong > Tip Amount</strong> <br />/ person
            </h2>
          </div>
          <h1 id="tip-amount" class="text-4xl font-mono text-[hsl(172_67%_45%)]">0.00</h1>
        </div>
        <div class="flex mb-12 justify-between items-center">
          <div>
            <h2 class="text-white font-mono"><strong>Total</strong> <br />/ person</h2>
          </div>
          <h1 id="total-amount" class="text-4xl font-mono text-[hsl(172_67%_45%)]">8.00</h1>
        </div>
        <div class="mx-auto text-gray-700 bg-[hsl(172_67%_45%)]  px-16 py-2">
          <button id="reset" class="font-mono" >  <strong>RESET</strong></button>
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
